<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辩手分院 · The Sorting of Debaters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0a10;
    --bg-2: #141320;
    --ink: #f3e8cf;
    --ink-dim: rgba(243, 232, 207, 0.62);
    --ink-mute: rgba(243, 232, 207, 0.32);
    --gold: #c9a24a;
    --gold-soft: #a98638;
    --gold-dim: #6d5523;
    --border: rgba(243, 232, 207, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
    background: var(--bg);
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse at 22% 18%, rgba(201, 162, 74, 0.10), transparent 55%),
      radial-gradient(ellipse at 78% 82%, rgba(201, 162, 74, 0.07), transparent 58%),
      radial-gradient(ellipse at 50% 50%, rgba(40, 30, 60, 0.35), transparent 70%),
      var(--bg);
    position: relative;
  }

  /* grain overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/></filter><rect width='240' height='240' filter='url(%23n)'/></svg>");
  }

  main {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 72px 24px 72px;
  }

  .screen {
    width: 100%;
    max-width: 720px;
    display: none;
  }
  .screen.active {
    display: block;
    animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes expand {
    from { width: 0; opacity: 0; }
    to   { width: 64px; opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }

  /* ——— corners ——— */
  .corner {
    position: fixed;
    width: 34px;
    height: 34px;
    pointer-events: none;
    opacity: 0.55;
    z-index: 3;
  }
  .corner.tl { top: 22px; left: 22px;  border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner.tr { top: 22px; right: 22px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner.bl { bottom: 22px; left: 22px;  border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner.br { bottom: 22px; right: 22px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  /* ——— INTRO ——— */
  .intro { text-align: center; }

  .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    opacity: 0;
    animation: reveal 0.8s ease 0.1s forwards;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 500;
    font-size: clamp(42px, 7.4vw, 72px);
    line-height: 1.08;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    opacity: 0;
    animation: reveal 0.9s ease 0.25s forwards;
  }
  .title em {
    font-style: normal;
    color: var(--gold);
    font-weight: 600;
  }

  .subtitle-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    margin-bottom: 34px;
    opacity: 0;
    animation: reveal 0.9s ease 0.4s forwards;
  }

  .divider {
    height: 1px;
    background: var(--gold);
    margin: 0 auto 36px;
    opacity: 0;
    animation: expand 0.8s ease 0.55s forwards;
  }

  .intro-text {
    font-size: 16px;
    line-height: 2;
    color: var(--ink-dim);
    max-width: 520px;
    margin: 0 auto 48px;
    opacity: 0;
    animation: reveal 0.9s ease 0.7s forwards;
  }
  .intro-text .accent { color: var(--ink); font-style: italic; }

  /* ——— BUTTONS ——— */
  .btn {
    display: inline-block;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.38em;
    color: var(--bg);
    background: var(--gold);
    border: 1px solid var(--gold);
    padding: 18px 38px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }
  .btn:hover {
    background: var(--ink);
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(201, 162, 74, 0.18);
  }
  .btn.appear {
    opacity: 0;
    animation: reveal 0.9s ease 0.85s forwards;
  }

  .btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn.ghost:hover {
    background: transparent;
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: none;
  }

  /* ——— QUIZ ——— */
  .progress-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 54px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.22em;
    color: var(--ink-mute);
  }
  .progress-track {
    flex: 1;
    height: 1px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
  }

  .q-tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.32em;
    color: var(--gold);
    margin-bottom: 18px;
  }

  .q-text {
    font-family: 'Noto Serif SC', serif;
    font-weight: 500;
    font-size: clamp(24px, 3.6vw, 32px);
    line-height: 1.55;
    letter-spacing: 0.04em;
    margin-bottom: 46px;
    max-width: 640px;
  }

  .options { display: flex; flex-direction: column; gap: 14px; }

  .option {
    background: transparent;
    border: 1px solid var(--border);
    padding: 22px 26px;
    color: var(--ink);
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    line-height: 1.6;
    text-align: left;
    cursor: pointer;
    transition: all 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .option::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.35s ease;
  }
  .option:hover {
    border-color: var(--gold);
    padding-left: 34px;
    background: rgba(201, 162, 74, 0.04);
  }
  .option:hover::before {
    transform: scaleY(1);
    transform-origin: top;
  }
  .option .mark {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 15px;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  /* ——— SORTING ——— */
  .sorting { text-align: center; padding: 40px 0; }
  .sorting-crest {
    font-family: 'Noto Serif SC', serif;
    font-size: 44px;
    color: var(--gold);
    letter-spacing: 0.6em;
    padding-left: 0.6em;
    margin-bottom: 28px;
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }
  .sorting-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.3em;
    color: var(--ink-dim);
    margin-bottom: 28px;
  }
  .sorting-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    letter-spacing: 0.5em;
    color: var(--ink-mute);
    padding-left: 0.5em;
    margin-bottom: 34px;
  }
  .sorting-dots {
    display: inline-flex;
    gap: 10px;
  }
  .sorting-dots span {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .sorting-dots span:nth-child(2) { animation-delay: 0.2s; }
  .sorting-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* ——— RESULT ——— */
  .result { text-align: center; }

  .result .eyebrow { animation-delay: 0.05s; }

  .crest {
    display: inline-block;
    width: 128px;
    height: 128px;
    line-height: 124px;
    font-family: 'Noto Serif SC', serif;
    font-weight: 500;
    font-size: 60px;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 50%;
    position: relative;
    margin-bottom: 26px;
    opacity: 0;
    animation: reveal 1s ease 0.2s forwards;
  }
  .crest::before {
    content: "";
    position: absolute;
    inset: 7px;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
  }

  .r-title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: clamp(38px, 6vw, 54px);
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 10px;
    padding-left: 0.2em;
    opacity: 0;
    animation: reveal 0.9s ease 0.4s forwards;
  }
  .r-title-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    letter-spacing: 0.28em;
    color: var(--ink-dim);
    margin-bottom: 38px;
    opacity: 0;
    animation: reveal 0.9s ease 0.55s forwards;
  }

  .hat-speech {
    font-family: 'Noto Serif SC', serif;
    font-size: 16.5px;
    font-weight: 400;
    line-height: 2.05;
    color: var(--ink);
    max-width: 560px;
    margin: 0 auto 38px;
    text-align: left;
    border-left: 1px solid var(--gold);
    padding: 6px 24px;
    opacity: 0;
    animation: reveal 0.9s ease 0.7s forwards;
  }
  .hat-speech em { font-style: italic; color: var(--gold); }

  .traits {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 44px;
    opacity: 0;
    animation: reveal 0.9s ease 0.85s forwards;
  }
  .trait {
    font-family: 'Noto Serif SC', serif;
    font-size: 12.5px;
    letter-spacing: 0.3em;
    color: var(--gold);
    padding: 8px 18px 8px 24px;
    border: 1px solid var(--gold-dim);
  }

  .r-actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: reveal 0.9s ease 1s forwards;
  }

  @media (max-width: 640px) {
    .corner { display: none; }
    main { padding: 48px 18px; }
    .option { padding: 18px 20px; font-size: 15px; }
    .option:hover { padding-left: 28px; }
    .hat-speech { padding: 4px 18px; font-size: 15.5px; line-height: 1.95; }
    .crest { width: 108px; height: 108px; line-height: 104px; font-size: 50px; }
    .btn { padding: 16px 28px; font-size: 13px; letter-spacing: 0.3em; }
    .intro-text { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<main>

  <!-- ——— INTRO ——— -->
  <section id="screen-intro" class="screen intro active">
    <div class="eyebrow">The Sorting Hat · for Debaters</div>
    <h1 class="title">辩手&nbsp;<em>分院</em>&nbsp;仪式</h1>
    <div class="subtitle-en">Which Kind of Debater Are You?</div>
    <div class="divider"></div>
    <p class="intro-text">
      「戴上这顶古老的帽子吧——<br>
      让它<span class="accent">听见你思维深处的回声</span>，<br>
      把你，送入最属于你的那一方阵营。」<br><br>
      六题之后，揭晓你的辩手灵魂。
    </p>
    <button class="btn appear" onclick="start()">戴&nbsp;上&nbsp;分&nbsp;院&nbsp;帽</button>
  </section>

  <!-- ——— QUIZ ——— -->
  <section id="screen-quiz" class="screen">
    <div class="progress-bar">
      <span id="progress-text">01 / 06</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="q-tag" id="q-tag">Question 01</div>
    <h2 class="q-text" id="q-text"></h2>
    <div class="options" id="q-options"></div>
  </section>

  <!-- ——— SORTING ——— -->
  <section id="screen-sorting" class="screen sorting">
    <div class="sorting-crest">理&nbsp;·&nbsp;辞&nbsp;·&nbsp;锋&nbsp;·&nbsp;谋</div>
    <div class="sorting-text">THE&nbsp;HAT&nbsp;IS&nbsp;THINKING</div>
    <div class="sorting-cn">分&nbsp;&nbsp;院&nbsp;&nbsp;帽&nbsp;&nbsp;沉&nbsp;&nbsp;思&nbsp;&nbsp;中</div>
    <div class="sorting-dots"><span></span><span></span><span></span></div>
  </section>

  <!-- ——— RESULT ——— -->
  <section id="screen-result" class="screen result">
    <div class="eyebrow">Your House</div>
    <div class="crest" id="r-crest">理</div>
    <h2 class="r-title" id="r-title"></h2>
    <div class="r-title-en" id="r-title-en"></div>
    <div class="hat-speech" id="r-speech"></div>
    <div class="traits" id="r-traits"></div>
    <div class="r-actions">
      <button class="btn ghost" onclick="restart()">重&nbsp;新&nbsp;测&nbsp;试</button>
      <button class="btn" id="share-btn" onclick="share(event)">复&nbsp;制&nbsp;结&nbsp;果</button>
    </div>
  </section>

</main>

<script>
  const questions = [
    {
      q: "拿到一个陌生的辩题，你的第一反应？",
      options: [
        { t: "冲向资料库，先搭建清晰的逻辑框架", type: "L" },
        { t: "思考议题背后的价值冲突与人的处境", type: "O" },
        { t: "预判对方立论，开始寻找攻击切入点", type: "H" },
        { t: "评估双方胜率，构思整体战术分工",   type: "S" }
      ]
    },
    {
      q: "比赛中最让你热血沸腾的瞬间？",
      options: [
        { t: "一道严密推演，让对方哑口无言",     type: "L" },
        { t: "结辩时，点燃全场的共鸣与沉默",     type: "O" },
        { t: "质询中，精准抓住对方的破绽",       type: "H" },
        { t: "战术配合，打出教科书般的压制",     type: "S" }
      ]
    },
    {
      q: "你认为一名好辩手最不可或缺的是？",
      options: [
        { t: "清晰的逻辑与严密的论证",           type: "L" },
        { t: "深刻的价值与动人的表达",           type: "O" },
        { t: "敏锐的反应与凌厉的质询",           type: "H" },
        { t: "冷静的判断与全局的眼光",           type: "S" }
      ]
    },
    {
      q: "赛前准备，你花最多时间在哪一块？",
      options: [
        { t: "梳理论证链，寻找数据与文献",       type: "L" },
        { t: "打磨语言，雕刻例证与金句",         type: "O" },
        { t: "模拟对方立论，准备质询套路",       type: "H" },
        { t: "拟定全盘战术与攻防节奏",           type: "S" }
      ]
    },
    {
      q: "最让你头皮发麻的对手，是哪一种？",
      options: [
        { t: "价值牌打得荡气回肠，令人动摇",     type: "L" },
        { t: "逻辑锁链严丝合缝，滴水不漏",       type: "O" },
        { t: "战术诡谲多变，节奏难以捉摸",       type: "H" },
        { t: "质询快如刀锋，追击不留余地",       type: "S" }
      ]
    },
    {
      q: "如果可以挑，你心目中最理想的辩位是？",
      options: [
        { t: "一辩 — 立论定调，奠定战局",        type: "L" },
        { t: "四辩 — 结辩升华，一锤定音",        type: "O" },
        { t: "二辩 — 质询攻击，锋芒毕露",        type: "H" },
        { t: "三辩 — 自由搏击，掌控全局",        type: "S" }
      ]
    }
  ];

  const results = {
    L: {
      sigil: "理",
      title: "逻辑剑客",
      titleEn: "The Logician",
      speech: "分院帽低声道——<br><br>「你的思维，如一柄精锻的长剑。你信奉推理的锋利、证据的重量，不被情绪左右，不被辞藻迷惑。<em>在你眼中，每一句结论都必须经得起因果的拷问。</em>当对手的论点出现哪怕一丝裂痕，你便能以最干净的一刀，将它划开。」<br><br>理据即你的铠甲，逻辑是你的剑。",
      traits: ["严谨", "清晰", "冷静", "深思"]
    },
    O: {
      sigil: "辞",
      title: "烛火诗人",
      titleEn: "The Orator",
      speech: "分院帽轻声道——<br><br>「你的言辞，是一支在风中不灭的烛火。你看得见每一个辩题背后，<em>那些真实的人、真实的痛与真实的光。</em>你用故事唤醒共鸣，用意象照亮真相。当你开口，评委的笔会停下，对手的呼吸会慢下来。」<br><br>以情动人，以意驭言——这是你最深的武器。",
      traits: ["感性", "洞察", "富感染力", "人文"]
    },
    H: {
      sigil: "锋",
      title: "锋芒猎手",
      titleEn: "The Hunter",
      speech: "分院帽笑了一声——<br><br>「有意思，又一个嗜战的灵魂。质询台是你的猎场，每一个问题都是精心埋下的陷阱。<em>你眼神犀利，反应极快，</em>擅长在对手最自信的地方，找到他们最脆弱的缝隙。你不只是在辩论，你是在狩猎。」<br><br>锋刃在手，战意长存。",
      traits: ["敏捷", "犀利", "好斗", "洞察入微"]
    },
    S: {
      sigil: "谋",
      title: "棋局执子者",
      titleEn: "The Strategist",
      speech: "分院帽沉吟片刻——<br><br>「你站在棋盘之上，看着双方每一子的落点。<em>你不迷信一时的精彩，</em>因为你知道，赢下一场比赛从来不靠一句漂亮话，而是靠整盘的调度与耐心。你是队伍里那个冷静到近乎冷峻的人——当你落下最后一子，全场都会明白，胜负早已写定。」<br><br>一子千机，全盘皆活。",
      traits: ["沉稳", "大局观", "决断", "领袖气"]
    }
  };

  const screens = {
    intro:   document.getElementById('screen-intro'),
    quiz:    document.getElementById('screen-quiz'),
    sorting: document.getElementById('screen-sorting'),
    result:  document.getElementById('screen-result')
  };

  let current = 0;
  const scores = { L: 0, O: 0, H: 0, S: 0 };

  function show(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    const el = screens[name];
    // retrigger fadeUp
    el.classList.add('active');
  }

  function start() {
    current = 0;
    scores.L = scores.O = scores.H = scores.S = 0;
    show('quiz');
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[current];
    document.getElementById('q-tag').textContent =
      'Question ' + String(current + 1).padStart(2, '0');
    document.getElementById('progress-text').textContent =
      String(current + 1).padStart(2, '0') + ' / ' + String(questions.length).padStart(2, '0');
    document.getElementById('progress-fill').style.transform =
      `scaleX(${current / questions.length})`;
    document.getElementById('q-text').textContent = q.q;

    const container = document.getElementById('q-options');
    container.innerHTML = '';
    q.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.style.opacity = '0';
      btn.style.animation = `reveal 0.5s ease ${0.12 + idx * 0.08}s forwards`;
      btn.innerHTML =
        `<span class="mark">${String.fromCharCode(65 + idx)}.</span><span>${opt.t}</span>`;
      btn.addEventListener('click', () => select(opt.type));
      container.appendChild(btn);
    });
  }

  function select(type) {
    scores[type] += 1;
    current += 1;

    if (current < questions.length) {
      document.getElementById('progress-fill').style.transform =
        `scaleX(${current / questions.length})`;
      // replay fadeUp
      screens.quiz.classList.remove('active');
      void screens.quiz.offsetWidth;
      screens.quiz.classList.add('active');
      renderQuestion();
    } else {
      document.getElementById('progress-fill').style.transform = 'scaleX(1)';
      show('sorting');
      setTimeout(() => {
        show('result');
        renderResult();
      }, 2000);
    }
  }

  function renderResult() {
    let topKey = 'L';
    let topVal = -1;
    for (const k in scores) {
      if (scores[k] > topVal) { topVal = scores[k]; topKey = k; }
    }
    const r = results[topKey];
    document.getElementById('r-crest').textContent = r.sigil;
    document.getElementById('r-title').textContent = r.title;
    document.getElementById('r-title-en').textContent = r.titleEn;
    document.getElementById('r-speech').innerHTML = r.speech;

    const t = document.getElementById('r-traits');
    t.innerHTML = '';
    r.traits.forEach(x => {
      const span = document.createElement('span');
      span.className = 'trait';
      span.textContent = x;
      t.appendChild(span);
    });
    window._topResult = r;
  }

  function restart() {
    show('intro');
  }

  function share(ev) {
    const r = window._topResult;
    if (!r) return;
    const text = `我在「辩手分院仪式」中被分到 ——【${r.title} · ${r.titleEn}】\n你也来试试？`;
    const btn = ev.currentTarget;
    const original = btn.innerHTML;

    const done = () => {
      btn.innerHTML = '已&nbsp;复&nbsp;制&nbsp;✓';
      setTimeout(() => { btn.innerHTML = original; }, 2000);
    };

    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      done();
    };

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else {
      fallback();
    }
  }
</script>
</body>
</html>
